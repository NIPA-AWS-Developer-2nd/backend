name: ECR Build and Push

on:
  push:
    branches:
      - actions/ecs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make envfile
        uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_NODE_ENV: "development"
          envkey_FRONTEND_URL: "http://localhost:5173"
          envkey_DB_HOST: ${{ secrets.DB_HOST}}
          envkey_DB_PORT: ${{ secrets.DB_PORT}}
          envkey_DB_USERNAME: ${{ secrets.DB_USERNAME}}
          envkey_DB_PASSWORD: ${{ secrets.DB_PASSWORD}}
          envkey_DB_NAME: ${{ secrets.DB_NAME}}
          envkey_KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          envkey_KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          envkey_REDIRECT_URI: ${{ secrets.REDIRECT_URI}}
          envkey_NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID}}
          envkey_NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET}}
          envkey_JWT_SECRET: ${{ secrets.JWT_SECRET}}
          envkey_AWS_REGION: ${{ secrets.AWS_REGION}}
          envkey_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID}}
          envkey_AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME}}
          envkey_AWS_CLOUDFRONT_DOMAIN: ${{ secrets.AWS_CLOUDFRONT_DOMAIN}}   
          file_name: .env.development
          fail_on_empty: false
          sort_keys: false  
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3
      - name: Build and Push to ECR
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: halsaram/backend
          tags: ${{ steps.commit.outputs.short }}, latest
          registry: ${{ secrets.AWS_ECR_REGISTRY }}
          dockerfile: Dockerfile
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_ACTIONS }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_ACTIONS }}
